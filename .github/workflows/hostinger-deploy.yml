name: Hostinger deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify-production:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Verify production health
        shell: powershell
        run: |
          $ok = $false
          for ($i = 1; $i -le 12; $i++) {
            $health = curl.exe -sS -m 20 -w "`nHTTP:%{http_code}`n" "https://axelmond.com/api/health"
            Write-Output "attempt $i"
            Write-Output $health
            if ($health -match 'HTTP:200') { $ok = $true; break }
            Start-Sleep -Seconds 15
          }
          if (-not $ok) { throw "Production health check failed after retries" }

      - name: Verify production catalog
        shell: powershell
        run: |
          $catalog = curl.exe -sS -m 20 -w "`nHTTP:%{http_code} TIME:%{time_total}s`n" "https://axelmond.com/api/courses"
          Write-Output ($catalog.Substring(0, [Math]::Min(400, $catalog.Length)))
          if ($catalog -notmatch 'HTTP:200') { throw "Production catalog check failed" }

      - name: Production deploy note
        shell: powershell
        run: |
          Write-Output "Hostinger Node.js auto-deployment handles pushes to main."
          Write-Output "SSH remote exec is disabled on shared hosting; use hPanel Deployments for manual redeploy."
