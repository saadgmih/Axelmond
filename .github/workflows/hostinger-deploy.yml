name: Hostinger deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: hostinger-production
  cancel-in-progress: false

jobs:
  verify-production:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Verify production edge stability
        env:
          PRODUCTION_PROBE_ROUNDS: "5"
          PRODUCTION_PROBE_DELAY_MS: "15000"
          PRODUCTION_PROBE_TIMEOUT_MS: "20000"
        run: node scripts/verify-production-edge.mjs

      - name: Production deploy note
        shell: powershell
        run: |
          Write-Output "Hostinger Node.js auto-deployment handles pushes to main."
          Write-Output "SSH remote exec is disabled on shared hosting; use hPanel Deployments for manual redeploy."
