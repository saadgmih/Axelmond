name: Hostinger deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Configure SSH
        shell: powershell
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          $sshDir = Join-Path $env:RUNNER_TEMP 'ci-ssh'
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null
          $keyPath = Join-Path $sshDir 'id_ed25519'
          $knownHosts = Join-Path $sshDir 'known_hosts'
          Set-Content -Path $keyPath -Value $env:SSH_KEY
          icacls $keyPath /inheritance:r /grant:r "$($env:USERNAME):(R)" | Out-Null
          cmd /c "ssh-keyscan -p $env:SSH_PORT -H $env:SSH_HOST 2>nul" | Out-File -Append -Encoding ascii $knownHosts
          "SSH_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SSH_KNOWN_HOSTS=$knownHosts" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Deploy to Hostinger
        shell: powershell
        env:
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          $remote = @'
          set -euo pipefail
          APP_DIR="$HOME/domains/axelmond.com/nodejs"
          if [ ! -d "$APP_DIR" ]; then APP_DIR="$HOME/domains/axelmond.com/public_html"; fi
          cd "$APP_DIR"
          bash scripts/deploy-hostinger.sh
          curl -sS -m 20 -w "\nHTTP:%{http_code}\n" "http://127.0.0.1:3000/api/health" || true
          '@
          $remote | ssh -i $env:SSH_KEY_PATH -p $env:SSH_PORT -o UserKnownHostsFile=$env:SSH_KNOWN_HOSTS -o BatchMode=yes -o ConnectTimeout=20 "$($env:SSH_USER)@$($env:SSH_HOST)" "bash -s"
