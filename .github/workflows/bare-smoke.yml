name: Bare smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bare-smoke.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, Windows, X64]
    steps:
      - name: Verify runner
        shell: pwsh
        run: Write-Output "bare runner ok on self-hosted Windows"
