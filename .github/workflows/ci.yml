name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: [self-hosted, Windows, X64]

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/axelmond_ci?schema=AxelmondResearchLab&sslmode=require
      NODE_ENV: test
      AUTH_TOKEN_SECRET: ci-auth-secret-32-characters-minimum-value
      EMAIL_VERIFICATION_SECRET: ci-email-secret-32-characters-minimum-value

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        shell: powershell
        run: npm ci

      - name: Lint
        shell: powershell
        run: npm run lint

      - name: Strict TypeScript
        shell: powershell
        run: npm run lint:strict

      - name: ESLint
        shell: powershell
        run: npm run lint:eslint

      - name: Format check
        shell: powershell
        run: npm run format:check

      - name: Test
        shell: powershell
        run: npm test

      - name: Migration guard
        shell: powershell
        run: npm run ci:migrations

      - name: Generate Prisma client
        shell: powershell
        run: npx prisma generate

      - name: Apply Prisma migrations
        shell: powershell
        run: npx prisma migrate deploy

      - name: Security runtime tests
        shell: powershell
        run: npm run test:security-runtime

      - name: Build
        shell: powershell
        run: npm run build

      - name: Security preflight
        shell: powershell
        env:
          NODE_ENV: production
          APP_URL: https://axelmond.com
          MOBILE_CLIENT_SECRET: ci-mobile-secret-32-characters-minimum-value
          PAYPAL_CLIENT_ID: x
          PAYPAL_CLIENT_SECRET: y
          PAYPAL_WEBHOOK_ID: z
          LIVEKIT_URL: wss://x.livekit.cloud
          LIVEKIT_API_KEY: k
          LIVEKIT_API_SECRET: ci-livekit-secret-32-characters-minimum
          UPLOADTHING_TOKEN: ci-uploadthing-secret-32-characters-min
          SMTP_HOST: smtp.example.com
          SMTP_USER: u
          SMTP_PASS: ci-smtp-pass-32-characters-minimum-value
          VAPID_PUBLIC_KEY: BMxtest
          VAPID_PRIVATE_KEY: ci-vapid-private-32-characters-minimum
          PAYPAL_ENV: live
        run: npx tsx scripts/security-preflight.ts

      - name: npm audit (high+)
        shell: powershell
        run: npm audit --audit-level=high

      - name: Secret scan
        shell: powershell
        run: npm run ci:secrets
