name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: [self-hosted, Windows, X64]

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/axelmond_ci?schema=AxelmondResearchLab
      NODE_ENV: test
      AUTH_TOKEN_SECRET: ci-auth-secret-32-characters-minimum-value
      EMAIL_VERIFICATION_SECRET: ci-email-secret-32-characters-minimum-value

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Test
        shell: pwsh
        run: npm test -- tests/security-score-guards.test.ts tests/owasp-pen-test-guards.test.ts tests/security-max-hardening.test.ts tests/production-config.test.ts tests/security-hardening.test.ts

      - name: Generate Prisma client
        shell: pwsh
        run: npx prisma generate

      - name: Build
        shell: pwsh
        run: npm run build

      - name: Security preflight
        shell: pwsh
        env:
          NODE_ENV: production
          APP_URL: https://axelmond.com
          MOBILE_CLIENT_SECRET: ${{ env.AUTH_TOKEN_SECRET }}
          PAYPAL_CLIENT_ID: x
          PAYPAL_CLIENT_SECRET: y
          PAYPAL_WEBHOOK_ID: z
          LIVEKIT_URL: wss://x.livekit.cloud
          LIVEKIT_API_KEY: k
          LIVEKIT_API_SECRET: ${{ env.AUTH_TOKEN_SECRET }}
          UPLOADTHING_TOKEN: ${{ env.AUTH_TOKEN_SECRET }}
          SMTP_HOST: smtp.example.com
          SMTP_USER: u
          SMTP_PASS: ${{ env.EMAIL_VERIFICATION_SECRET }}
          VAPID_PUBLIC_KEY: BMxtest
          VAPID_PRIVATE_KEY: ${{ env.AUTH_TOKEN_SECRET }}
          PAYPAL_ENV: live
        run: npx tsx scripts/security-preflight.ts

      - name: npm audit (high+)
        shell: pwsh
        run: npm audit --audit-level=high

      - name: Secret scan
        shell: pwsh
        run: npm run ci:secrets
