name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: [self-hosted, Windows, X64]

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/axelmond_ci?schema=AxelmondResearchLab&sslmode=disable
      NODE_ENV: test
      AUTH_TOKEN_SECRET: ci-auth-secret-32-characters-minimum-value
      EMAIL_VERIFICATION_SECRET: ci-email-secret-32-characters-minimum-value

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Configure CI PostgreSQL paths
        shell: powershell
        run: |
          $instanceName = "axelmond-postgres-${{ github.run_id }}"
          $basePath = Join-Path $env:RUNNER_TEMP $instanceName
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "CI_POSTGRES_DATA_DIR=$basePath"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "CI_POSTGRES_READY_FILE=${basePath}.ready"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "CI_POSTGRES_STOP_FILE=${basePath}.stop"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "CI_POSTGRES_PID_FILE=${basePath}.pid"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "CI_POSTGRES_STDOUT=${basePath}.out.log"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "CI_POSTGRES_STDERR=${basePath}.err.log"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "CI_POSTGRES_MODULE_DIR=${basePath}.tools"

      - name: Install dependencies
        shell: powershell
        env:
          SKIP_PRISMA_POSTINSTALL: "1"
        run: npm ci

      - name: Install CI PostgreSQL runtime
        shell: powershell
        run: npm install --prefix $env:CI_POSTGRES_MODULE_DIR --no-save --package-lock=false --no-audit --no-fund embedded-postgres@18.4.0-beta.17

      - name: Generate Prisma client
        shell: powershell
        run: npm run prisma:generate

      - name: Verify with CI PostgreSQL
        shell: powershell
        env:
          CI_PREFLIGHT_NODE_ENV: production
          CI_PREFLIGHT_APP_URL: https://axelmond.com
          CI_PREFLIGHT_DATABASE_URL: postgresql://ci:ci@db.example.com:5432/axelmond?sslmode=require
          CI_PREFLIGHT_MOBILE_CLIENT_SECRET: ci-mobile-secret-32-characters-minimum-value
          CI_PREFLIGHT_PAYPAL_CLIENT_ID: x
          CI_PREFLIGHT_PAYPAL_CLIENT_SECRET: y
          CI_PREFLIGHT_PAYPAL_WEBHOOK_ID: z
          CI_PREFLIGHT_LIVEKIT_URL: wss://x.livekit.cloud
          CI_PREFLIGHT_LIVEKIT_API_KEY: k
          CI_PREFLIGHT_LIVEKIT_API_SECRET: ci-livekit-secret-32-characters-minimum
          CI_PREFLIGHT_UPLOADTHING_TOKEN: ci-uploadthing-secret-32-characters-min
          CI_PREFLIGHT_SMTP_HOST: smtp.example.com
          CI_PREFLIGHT_SMTP_USER: u
          CI_PREFLIGHT_SMTP_PASS: ci-smtp-pass-32-characters-minimum-value
          CI_PREFLIGHT_VAPID_PUBLIC_KEY: BMxtest
          CI_PREFLIGHT_VAPID_PRIVATE_KEY: ci-vapid-private-32-characters-minimum
          CI_PREFLIGHT_PAYPAL_ENV: live
        run: node scripts/run-ci-with-postgres.mjs

      - name: Clean CI PostgreSQL
        if: always()
        shell: powershell
        run: |
          Set-Content -LiteralPath $env:CI_POSTGRES_STOP_FILE -Value "stop"
          if (Test-Path -LiteralPath $env:CI_POSTGRES_PID_FILE) {
            $postgresPid = [int](Get-Content -LiteralPath $env:CI_POSTGRES_PID_FILE -Raw)
            for ($attempt = 1; $attempt -le 30; $attempt++) {
              if (-not (Get-Process -Id $postgresPid -ErrorAction SilentlyContinue)) { break }
              Start-Sleep -Milliseconds 500
            }
            if (Get-Process -Id $postgresPid -ErrorAction SilentlyContinue) {
              Stop-Process -Id $postgresPid -Force
            }
          }

          $tempRoot = [IO.Path]::GetFullPath($env:RUNNER_TEMP)
          foreach ($candidate in @($env:CI_POSTGRES_DATA_DIR, $env:CI_POSTGRES_MODULE_DIR)) {
            $cleanupPath = [IO.Path]::GetFullPath($candidate)
            if (-not $cleanupPath.StartsWith($tempRoot, [StringComparison]::OrdinalIgnoreCase)) {
              throw "Refusing to clean PostgreSQL files outside RUNNER_TEMP: $cleanupPath"
            }
            Remove-Item -LiteralPath $cleanupPath -Recurse -Force -ErrorAction SilentlyContinue
          }
