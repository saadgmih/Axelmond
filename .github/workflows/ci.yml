name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: axelmond_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d axelmond_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/axelmond_ci?schema=AxelmondResearchLab
      NODE_ENV: test
      AUTH_TOKEN_SECRET: ci-auth-secret-32-characters-minimum-value
      EMAIL_VERIFICATION_SECRET: ci-email-secret-32-characters-minimum-value

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run lint

      - name: Lint (TypeScript strict, src/)
        run: npm run lint:strict

      - name: Lint (ESLint)
        run: npm run lint:eslint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Security runtime tests
        run: npm run test:security-runtime

      - name: Build
        run: npm run build

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Secret scan
        run: npm run ci:secrets

      - name: Prisma migration check
        run: npm run ci:migrations
