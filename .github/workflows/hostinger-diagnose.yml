name: Hostinger diagnose

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ssh-diagnose:
    runs-on: [self-hosted, Windows, X64]
    steps:
      - name: Configure SSH
        shell: powershell
        env:
          SSH_KEY_B64: ${{ secrets.HOSTINGER_SSH_KEY_B64 }}
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          $sshDir = Join-Path $env:RUNNER_TEMP 'ci-ssh'
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null
          $keyPath = Join-Path $sshDir 'id_ed25519'
          $knownHosts = Join-Path $sshDir 'known_hosts'
          $key = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($env:SSH_KEY_B64.Trim()))
          if (-not $key.EndsWith("`n")) { $key += "`n" }
          [System.IO.File]::WriteAllText($keyPath, $key, [System.Text.UTF8Encoding]::new($false))
          icacls $keyPath /inheritance:r /grant:r "$($env:USERNAME):(F)" | Out-Null
          cmd /c "ssh-keyscan -p $env:SSH_PORT -H $env:SSH_HOST 2>nul" | Out-File -Append -Encoding ascii $knownHosts
          "SSH_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SSH_KNOWN_HOSTS=$knownHosts" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Validate SSH key material
        shell: powershell
        run: |
          ssh-keygen -y -f $env:SSH_KEY_PATH | Out-String | Write-Output

      - name: Production diagnostic
        shell: powershell
        run: |
          Write-Output "==> public health"
          curl.exe -sS -m 20 -w "`nHTTP:%{http_code}`n" "https://axelmond.com/api/health"
          Write-Output ""
          Write-Output "==> public catalog"
          curl.exe -sS -m 20 -w "`nHTTP:%{http_code} TIME:%{time_total}s`n" "https://axelmond.com/api/courses" | Select-Object -First 3
          Write-Output ""
          Write-Output "Note: Hostinger shared Node.js hosting blocks SSH remote exec; use hPanel Deployments + GitHub auto-deploy."
