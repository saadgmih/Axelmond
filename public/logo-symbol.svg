<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>
    <linearGradient id="flaskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
  </defs>

  <!-- Orbit Ring -->
  <g transform="rotate(-15 100 115)">
    <ellipse cx="100" cy="115" rx="75" ry="18" stroke="url(#orbitGrad)" stroke-width="6" fill="none" opacity="0.9" />
  </g>

  <!-- A and R structures -->
  <path d="M 62 145 L 90 70 L 100 70" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 95 70 L 125 145" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 92 74 C 115 74 135 84 135 102 C 135 118 115 125 95 125" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 112 120 L 140 145" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Beaker/Flask -->
  <g transform="translate(84, 94)">
    <path d="M 12 0 H 18 V 12 H 12 Z" fill="url(#flaskGrad)" />
    <path d="M 12 12 L 0 35 C -2 39 1 42 6 42 H 24 C 29 42 32 39 30 35 L 18 12 Z" fill="url(#flaskGrad)" stroke="#ffffff" stroke-width="2.5" />
    <circle cx="10" cy="32" r="2.5" fill="#ffffff" opacity="0.9" />
    <circle cx="20" cy="28" r="2" fill="#ffffff" opacity="0.9" />
    <circle cx="14" cy="23" r="1.5" fill="#ffffff" opacity="0.7" />
  </g>

  <!-- Graduation Cap -->
  <g transform="translate(70, 22)">
    <path d="M 30 0 L 60 10 L 30 20 L 0 10 Z" fill="#ffffff" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" opacity="0.95" />
    <path d="M 13 14.5 V 22 C 13 25 47 25 47 22 V 14.5" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <path d="M 30 10 L 53 14 V 24" fill="none" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="53" cy="25" r="2" fill="#eab308" />
  </g>
</svg>
